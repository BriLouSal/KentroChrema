{% load static tailwind_tags %}
<!doctype html>
<html lang="en">
  <head>
    {% tailwind_css %}
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home Menu</title>
    <link rel="stylesheet" href="{% static 'home.css' %}" />
  </head>
  <body>
    <div class="navbar">
      <a href="{% url 'portfolio' %}">Portfolio</a>
      <a href="{% url 'logout' %}">Logout</a>
    </div>

    <div
      class="flex flex-col flex-wrap gap-4 py-6 mb-100 mt-4 shadow-[0_0_15px_rgba(21,128,61,0.8)]"
    >
      <div class="w-1/2 items-center">
        <h1 class="font-bold text-[28px] text-gray-200 text-center mt-4">
          Top Gainer Today!
        </h1>
        {% for stocks in gainers %}
        <div class="w-[320px] flex flex-row items-center self-start">
          <h3 class="text-gray-200 text-[16px] mb-2 leading-none m-0">
            {{stocks.ticker}}: {{stocks.percent}}%
          </h3>

          <div class="relative h-[160px] w-[320px]">
            <canvas
              class="gainerGraph border-2 border-green-300 shadow-[0_0_15px_rgba(21,128,61,0.8)]"
            >
            </canvas>
          </div>
        </div>
        {% endfor %}
      </div>
    </div>

    {% block scripts %} 
    {% endblock scripts %}
  </body>
</html>
